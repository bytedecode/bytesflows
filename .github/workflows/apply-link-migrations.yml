name: Apply Link Migrations

on:
  push:
    branches:
      - fix/link-health-audit-2026-07
    paths:
      - 'scripts/fix-dead-internal-links.mjs'
      - '.github/workflows/apply-link-migrations.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout iteration branch
        uses: actions/checkout@v4
        with:
          ref: fix/link-health-audit-2026-07
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply explicit content-link migrations
        shell: bash
        run: |
          set -o pipefail
          node scripts/fix-dead-internal-links.mjs --write 2>&1 | tee fix-links.log

      - name: Validate migrated content
        shell: bash
        run: |
          set -o pipefail
          node scripts/check-link-health.mjs 2>&1 | tee link-health-after-fix.log

      - name: Commit migrated content to iteration branch
        shell: bash
        run: |
          if git diff --quiet -- content; then
            echo 'No content changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add content
          git commit -m 'fix(content): migrate obsolete internal links'
          git push origin HEAD:fix/link-health-audit-2026-07

      - name: Upload migration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-migration-reports
          path: |
            fix-links.log
            link-health-after-fix.log
          if-no-files-found: warn
          retention-days: 7
