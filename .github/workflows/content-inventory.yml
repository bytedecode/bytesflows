name: Content Inventory

on:
  push:
    branches:
      - fix/link-health-audit-2026-07
    paths:
      - 'scripts/export-content-inventory.mjs'
      - '.github/workflows/content-inventory.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout iteration branch
        uses: actions/checkout@v4
        with:
          ref: fix/link-health-audit-2026-07
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Export content inventory
        run: node scripts/export-content-inventory.mjs

      - name: Commit temporary inventory
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add content-inventory.json
          git commit -m 'chore(audit): export temporary content inventory'
          git push origin HEAD:fix/link-health-audit-2026-07
